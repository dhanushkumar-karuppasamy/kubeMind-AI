apiVersion: apps/v1
kind: Deployment
metadata:
  name: face-recognition
  namespace: kubemind-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: face-recognition
  template:
    metadata:
      labels:
        app: face-recognition
    spec:
      containers:
      - name: face-recognition
        image: kubemind/face-recognition:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: face-recognition
  namespace: kubemind-demo
spec:
  selector:
    app: face-recognition
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP