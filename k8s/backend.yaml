apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubemind-backend
  namespace: kubemind-demo
  labels:
    app: kubemind-backend
    tier: backend
    version: v2.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubemind-backend
  template:
    metadata:
      labels:
        app: kubemind-backend
        tier: backend
        version: v2.0
      annotations:
        maintainer: kubemind@example.com
    spec:
      containers:
      - name: kubemind-backend
        image: kubemind/backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/metrics/current
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: kubemind-backend
  namespace: kubemind-demo
spec:
  selector:
    app: kubemind-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
